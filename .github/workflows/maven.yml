name: VFT Functional tests 

on:
  workflow_dispatch:
    inputs:
      agentName:
        description: 'Agent to run this job on'
        required: true
        default: 'slave'
        options: ['slave', 'slave-eupa']
      platformEnv:
        description: 'Agent to run this job on'
        required: true
        default: 'qa'
        options: ['qa', 'da', 'dev', 'reg', 'demo', 'ps']
      gitSourceBranch:
        description: 'Functional test Branch'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ${{ matrix.agentName }}
    strategy:
      matrix:
        agentName: [slave, slave-eupa]

    steps:
      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'

      - name: Set up Maven
        run: |
         sudo apt-get install -y maven
          
      - name: Checkout code
        uses: actions/checkout@v2
